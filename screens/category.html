<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=375" />
  <title>Prototype</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/screens.css" />
</head>
<body class="screen screen--category">
<div class="phone-shell" style="display:flex;flex-direction:column;">

  <!-- ── Dynamic Island ──────────────────────────────────────────── -->
  <div class="dynamic-island" aria-hidden="true"></div>

  <!-- ── Status bar ───────────────────────────────────────────────
       Component: components/status-bar.html
       Copy the markup from that file here.               ──────── -->
  <div class="status-bar" aria-hidden="true">
    <span class="status-bar__time" id="status-bar-time">9:41</span>
    <div class="status-bar__icons">
      <img class="status-bar__signal"  src="../assets/images/Mobile Signal.svg" alt="" />
      <img class="status-bar__wifi"    src="../assets/images/Wifi.svg"          alt="" />
      <img class="status-bar__battery" src="../assets/images/Battery.svg"       alt="" />
    </div>
  </div>

  <!-- ── Map area ──────────────────────────────────────────────── -->
  <div class="map-area">
    <div id="map"></div>

    <!-- Address bar ─────────────────────────────────────────────
         Component: components/address-bar.html
         Removed from this screen — kept as component only.
                                                         ──────── -->
  </div>

  <!-- ── FAB — back navigation ─────────────────────────────────
       Component: components/fab.html
       Positioned below status bar, top-left.              ──────── -->
  <button class="fab screen--category__fab" type="button" aria-label="Go back" onclick="window.location.href='destination.html'">
    <img class="fab__icon" src="../assets/images/arrow-backward.svg" alt="" aria-hidden="true" />
  </button>

  <!-- ── FAB — re-centre map ───────────────────────────────────
       Same vertical position as back FAB, right side.     ──────── -->
  <button class="fab screen--category__fab-recentre" type="button" aria-label="Centre map" onclick="window.mapsRecentre && window.mapsRecentre()">
    <img class="fab__icon" src="../assets/images/my_location_ios (outline).svg" alt="" aria-hidden="true" />
  </button>

  <!-- ── Bottom sheet ─────────────────────────────────────────────
       Component: components/category-bottomsheet.html
       Copy the markup from that file here.               ──────── -->
  <div class="bottom-sheet">

    <!-- Drag handle -->
    <div class="bottom-sheet__handle-wrap">
      <div class="bottom-sheet__handle"></div>
    </div>

    <!-- Category list -->
    <div class="category-list" role="radiogroup" aria-label="Select ride category">

      <div class="category-item category-item--selected" role="radio" aria-checked="true" tabindex="0" aria-label="Bolt, 5 minutes away, 4 seats, 5,50 euros">
        <div class="category-item__image"><img src="../assets/images/vehicle-standard.png" alt="" aria-hidden="true" /></div>
        <div class="category-item__info">
          <div class="category-item__row1">
            <div class="category-item__title"><span class="category-item__name">Bolt</span></div>
            <span class="category-item__price">5,50 €</span>
          </div>
          <div class="category-item__row2">
            <span class="category-item__eta">4 min</span>
            <span class="category-item__pax">
              <img class="category-item__pax-icon" src="../assets/images/user (outline).png" alt="" aria-hidden="true" /><span>4</span>
            </span>
          </div>
        </div>
      </div>

      <div class="category-item" role="radio" aria-checked="false" tabindex="0" aria-label="Basic with surge pricing, 3 minutes away, 4 seats, 4,20 euros">
        <div class="category-item__image"><img src="../assets/images/vehicle-hatchback.png" alt="" aria-hidden="true" /></div>
        <div class="category-item__info">
          <div class="category-item__separator"></div>
          <div class="category-item__row1">
            <div class="category-item__title">
              <span class="category-item__name">Basic</span>
              <img class="category-item__surge" src="../assets/images/surge_original.png" alt="Surge pricing active" />
            </div>
            <span class="category-item__price">4,20 €</span>
          </div>
          <div class="category-item__row2">
            <span class="category-item__eta">2 min</span>
            <span class="category-item__pax">
              <img class="category-item__pax-icon" src="../assets/images/user (outline).png" alt="" aria-hidden="true" /><span>4</span>
            </span>
          </div>
        </div>
      </div>

      <div class="category-item" role="radio" aria-checked="false" tabindex="0" aria-label="Comfort, 2 minutes away, 4 seats, 7,20 euros">
        <div class="category-item__image"><img src="../assets/images/vehicle-comfort.png" alt="" aria-hidden="true" /></div>
        <div class="category-item__info">
          <div class="category-item__separator"></div>
          <div class="category-item__row1">
            <div class="category-item__title"><span class="category-item__name">Comfort</span></div>
            <span class="category-item__price">7,20 €</span>
          </div>
          <div class="category-item__row2">
            <span class="category-item__eta">2 min</span>
            <span class="category-item__pax">
              <img class="category-item__pax-icon" src="../assets/images/user (outline).png" alt="" aria-hidden="true" /><span>4</span>
            </span>
          </div>
        </div>
      </div>

      <div class="category-item" role="radio" aria-checked="false" tabindex="0" aria-label="Premium, 2 minutes away, 4 seats, 9,20 euros">
        <div class="category-item__image"><img src="../assets/images/vehicle-premium.png" alt="" aria-hidden="true" /></div>
        <div class="category-item__info">
          <div class="category-item__separator"></div>
          <div class="category-item__row1">
            <div class="category-item__title"><span class="category-item__name">Premium</span></div>
            <span class="category-item__price">9,20 €</span>
          </div>
          <div class="category-item__row2">
            <span class="category-item__eta">5 min</span>
            <span class="category-item__pax">
              <img class="category-item__pax-icon" src="../assets/images/user (outline).png" alt="" aria-hidden="true" /><span>4</span>
            </span>
          </div>
        </div>
      </div>

      <div class="category-item" role="radio" aria-checked="false" tabindex="0" aria-label="XL, 2 minutes away, 8,20 euros">
        <div class="category-item__image"><img src="../assets/images/vehicle-xl.png" alt="" aria-hidden="true" /></div>
        <div class="category-item__info">
          <div class="category-item__separator"></div>
          <div class="category-item__row1">
            <div class="category-item__title"><span class="category-item__name">XL</span></div>
            <span class="category-item__price">8,20 €</span>
          </div>
          <div class="category-item__row2">
            <span class="category-item__eta">6 min</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Order sheet -->
    <div class="order-sheet">
      <div class="order-sheet__payment">
        <div class="order-sheet__payment-group">
          <img class="order-sheet__card-icon" src="../assets/images/Master_Card.png" alt="Mastercard" width="32" height="20" />
          <div class="order-sheet__payment-line">
            <span class="order-sheet__card-number">•••• 5698</span>
            <img class="order-sheet__chevron" src="../assets/images/chevron_down.png" alt="Change payment method" width="16" height="16" />
          </div>
        </div>
      </div>
      <div class="order-sheet__buttons">
        <button class="order-sheet__select-btn" type="button">Select Bolt</button>
        <button class="order-sheet__schedule-btn" type="button" aria-label="Schedule ride">
          <img src="../assets/images/scheduling.png" alt="" aria-hidden="true" />
        </button>
      </div>
    </div>

  </div><!-- /bottom-sheet -->

  </div><!-- /phone-shell -->
  <script>
  (function () {
    function _pad(n) { return n < 10 ? '0' + n : String(n); }
    function _tick() {
      var now = new Date();
      var el = document.getElementById('status-bar-time');
      if (el) el.textContent = now.getHours() + ':' + _pad(now.getMinutes());
    }
    _tick();
    setInterval(_tick, 10000);
  })();
  </script>
  <script src="../js/config.js"></script>
  <script>
    // Read route from home screen; fall back to demo values
    var _origin      = sessionStorage.getItem('route_origin')      || 'Vana-Lõuna 15, Tallinn';
    var _destination = sessionStorage.getItem('route_destination') || 'Gonsiori 125, Tallinn';

    // Use pre-geocoded coordinates if available (set by home screen autocomplete)
    var _originCoords = JSON.parse(sessionStorage.getItem('route_origin_coords')      || 'null');
    var _destCoords   = JSON.parse(sessionStorage.getItem('route_destination_coords') || 'null');

    window.ROUTE_REQUEST = {
      origin:      _originCoords || _origin,
      destination: _destCoords   || _destination,
      options: {
        onSuccess: function (result) {
          var distKm  = (result.distance / 1000).toFixed(1);
          var durMins = Math.round(result.duration / 60);
          console.log('Route loaded:', distKm + ' km,', durMins + ' min');
        }
      }
    };
  </script>
  <script src="../js/maps.js"></script>
  <script src="../js/main.js"></script>

</body>
</html>
