<!-- Old Map Pin Component -->
<!-- Displays a pickup/dropoff label bubble with stem and ground shadow -->
<!-- Usage: copy into a screen. Asset paths are relative to /screens/ -->
<!-- Customise: change data-label and data-value, or edit text inline -->
<!-- Variants: add class pin--dropoff for the destination colour -->

<div class="pin" aria-label="Pickup — 5 min">
  <div class="pin__bubble">
    <div class="pin__labels">
      <span class="pin__label">Pickup</span>
      <span class="pin__value">5 min</span>
    </div>
  </div>
  <div class="pin__pillar">
    <img class="pin__pile"    src="../assets/images/pin-pile.svg"    alt="" aria-hidden="true" />
    <img class="pin__pointer" src="../assets/images/pin-pointer.svg" alt="" aria-hidden="true" />
    <img class="pin__ellipse" src="../assets/images/pin-ellipse.svg" alt="" aria-hidden="true" />
    <img class="pin__target"  src="../assets/images/pin-target.svg"  alt="" aria-hidden="true" />
  </div>
</div>
