<!-- FAB (Floating Action Button) Component -->
<!-- Circular white button with drop-shadow, contains a centered icon -->
<!-- Default icon: arrow-left (back navigation) -->
<!-- Usage: position absolutely within .phone-shell or .map-area -->
<!-- Asset paths are relative to /screens/ -->

<button class="fab" type="button" aria-label="Go back">
  <img class="fab__icon" src="../assets/images/arrow-left.svg" alt="" aria-hidden="true" />
</button>
